<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f0f23" />
    <meta name="description" content="Experience the future of gaming with AI-powered hand gesture controls. Master realistic physics in this stunning slingshot game." />
    <meta name="keywords" content="slingshot, physics game, hand tracking, gesture control, AI game, browser game" />
    <meta name="author" content="Slingshot Physics" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Slingshot Physics - AI Gesture Game" />
    <meta property="og:description" content="Master realistic physics with your hands. The future of browser gaming is here." />
    
    <!-- Apple Touch Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Slingshot" />
    
    <title>Slingshot Physics | AI Gesture-Controlled Game</title>
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
    
    <!-- Inline Critical CSS -->
    <style>
      /* Prevent FOUC */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f0f23;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      /* Loading Screen */
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        font-size: 4rem;
        margin-bottom: 1rem;
        animation: bounce 2s ease-in-out infinite;
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      .loading-text {
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 1px;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        margin-top: 2rem;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Prevent text selection */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading Screen -->
      <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">🎯</div>
        <div class="loading-text">LOADING GAME</div>
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loading screen when app is ready -->
    <script>
      window.addEventListener('load', function() {
        const loadingScreen = document.getElementById('loadingScreen');
        if (loadingScreen) {
          setTimeout(function() {
            loadingScreen.classList.add('hidden');
          }, 500);
        }
      });
      
      // Prevent context menu on canvas
      document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'CANVAS') {
          e.preventDefault();
        }
      });
      
      // Prevent zoom on double tap
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  </body>
</html>
